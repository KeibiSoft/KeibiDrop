syntax = "proto3";

package keibidrop;

option go_package = "github.com/KeibiSoft/KeibiDrop/grpc_bindings;keibidrop";

// ========== FILE OPERATIONS ==========

service KeibiService {
  rpc Open (OpenRequest) returns (OpenResponse);
  rpc Write (stream WriteRequest) returns (WriteResponse);
  rpc Read (stream ReadRequest) returns (stream ReadResponse);
  rpc Fsync (FsyncRequest) returns (FsyncResponse);
  rpc Close (CloseRequest) returns (CloseResponse);

  rpc Notify (NotifyRequest) returns (NotifyResponse);

  rpc Debug (DebugRequest) returns (DebugResponse);

  // Re-keying for forward secrecy during long sessions.
  rpc Rekey (RekeyRequest) returns (RekeyResponse);

  // Connection health monitoring for auto-reconnection.
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}

// ========== MESSAGE DEFINITIONS ==========

message DebugRequest{}

message DebugResponse{}

message OpenRequest {
  string path = 1;
  bool create = 2;
  bool truncate = 3;
}

message OpenResponse {
  uint64 handle = 1;
}

message WriteRequest {
  uint64 handle = 1;
  string path = 2;
  bytes data = 3;
  uint64 offset = 4;
  uint64 size = 5;
}

message WriteResponse {
  uint32 bytes_written = 1;
}

message ReadRequest {
  uint64 handle = 1;
  string path = 2;
  uint64 offset = 3;
  uint32 size = 4;
  bool prefetch = 5;           // If true, stream entire file (ignore offset/size).
  uint64 local_size = 6;       // Local file size (for delta detection).
  uint64 local_mtime = 7;      // Local mtime (for delta detection).
}

message ReadResponse {
  bytes data = 1;
  uint64 offset = 2;           // For delta sync: offset where this chunk applies.
  bool is_delta = 3;           // True if this is a delta chunk (not full file).
  uint64 total_size = 4;       // Total file size (for prefetch completion).
}

message FsyncRequest {
  uint64 handle = 1;
  string path = 2;
}

message FsyncResponse {}

message CloseRequest {
  uint64 handle = 1;
  string path = 2;
}

message CloseResponse {}

// ========== NOTIFY STRUCTURES ==========

message NotifyRequest {
  NotifyType type = 1;
  string path = 2;
  string name = 3;
  Attr attr = 4;
  string old_path = 5;  // For RENAME operations: the source path.
}

message NotifyResponse {
  string status = 1;
}

enum NotifyType {
  UNKNOWN = 0;
  ADD_DIR = 1;
  ADD_FILE = 2;
  REMOVE_DIR = 3;
  REMOVE_FILE = 4;
  EDIT_DIR = 5;
  EDIT_FILE = 6;
  RENAME_FILE = 7;  // File moved/renamed. old_path -> path.
  RENAME_DIR = 8;   // Directory moved/renamed. old_path -> path.
}

message Attr {
  uint64 dev = 1;
  uint64 ino = 2;
  uint32 mode = 3;
  int64 size = 4;
  uint64 accessTime = 5;
  uint64 modificationTime = 6;
  uint64 changeTime = 7;
  uint64 birthTime = 8;
  uint32 flags = 9;
}

// ========== RE-KEYING ==========

// RekeyRequest initiates key rotation for forward secrecy.
// Sent when byte/message threshold is reached.
message RekeyRequest {
  map<string, bytes> enc_seeds = 1;  // x25519, mlkem encapsulated seeds
  uint64 epoch = 2;                  // monotonic key epoch counter
}

// RekeyResponse acknowledges rekey and provides peer's new seeds.
message RekeyResponse {
  map<string, bytes> enc_seeds = 1;  // peer's new encapsulated seeds
  uint64 epoch = 2;                  // confirmed epoch
}

// ========== HEARTBEAT (CONNECTION HEALTH) ==========

// HeartbeatRequest for connection health monitoring.
// Sent every 5 seconds; 3 consecutive failures trigger reconnection.
message HeartbeatRequest {
  uint64 timestamp = 1;  // sender's unix nano timestamp
  uint64 seq = 2;        // monotonic sequence number
}

// HeartbeatResponse echoes the request for RTT calculation.
message HeartbeatResponse {
  uint64 timestamp = 1;      // responder's unix nano timestamp
  uint64 req_timestamp = 2;  // echo of request timestamp (for RTT)
  uint64 seq = 3;            // echo of sequence number
}

