name: keibidrop
arch: "${GOARCH}"
version: "${VERSION}"
maintainer: "KeibiSoft SRL <contact@keibisoft.com>"
description: "End-to-end encrypted peer-to-peer file sharing"
homepage: "https://github.com/KeibiSoft/KeibiDrop"
license: MPL-2.0
section: net
priority: optional

depends:
  - libfuse2
suggests:
  - fuse3

contents:
  - src: rust/target/release/keibidrop-rust
    dst: /usr/local/bin/keibidrop
    file_info:
      mode: 0755

  - src: keibidrop-cli
    dst: /usr/local/bin/keibidrop-cli
    file_info:
      mode: 0755

  - src: kd
    dst: /usr/local/bin/kd
    file_info:
      mode: 0755

  - src: assets/icons/icon-256.png
    dst: /usr/share/icons/hicolor/256x256/apps/keibidrop.png

  - src: assets/icons/icon-128.png
    dst: /usr/share/icons/hicolor/128x128/apps/keibidrop.png

  - src: assets/icons/icon-64.png
    dst: /usr/share/icons/hicolor/64x64/apps/keibidrop.png

  - src: assets/keibidrop.desktop
    dst: /usr/share/applications/keibidrop.desktop
