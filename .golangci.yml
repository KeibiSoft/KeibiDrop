version: "2"

run:
  timeout: 3m

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - gocritic
    - ineffassign
    - gosec
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*os.File).Sync
        - (net.Conn).Close
        - (*net.TCPConn).Close
        - (*net.UDPConn).Close
        - (*net.UDPConn).Write
        - (*net.UDPConn).SetReadBuffer
        - (*net.UDPConn).SetReadDeadline
        - (*google.golang.org/grpc.ClientConn).Close
        - fmt.Fprintln
        - fmt.Fprintf
        - os.Remove
        - os.RemoveAll
        - (*os.Process).Kill
    gosec:
      excludes:
        - G104
        - G115
        - G118
        - G301
        - G302
        - G304
        - G306
        - G703
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - path: testing/
        linters:
          - errcheck
          - gosec
      - text: "Error return value of .*.Close"
        linters:
          - errcheck
      - text: "Error return value of .*.CloseSend"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
