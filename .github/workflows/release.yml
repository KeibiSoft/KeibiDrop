name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            package: dmg
          - os: macos-13
            goos: darwin
            goarch: amd64
            package: dmg
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            package: deb

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
          key: rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock') }}

      - name: Install protoc and FUSE dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse3-dev protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc Go plugins
        run: make install-proto

      - name: Install nfpm (Linux)
        if: runner.os == 'Linux'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build all binaries
        run: make build-all

      - name: Package .dmg (macOS)
        if: matrix.package == 'dmg'
        run: make package-macos

      - name: Package .tar.gz
        run: make package-tar

      - name: Package .deb (Linux)
        if: matrix.package == 'deb'
        run: make package-deb

      - name: Generate checksums
        run: make checksums

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.tar.gz" -o -name "SHA256SUMS" \) -exec cp {} release/ \;
          cd release && cat SHA256SUMS > combined-SHA256SUMS || true
          cd release && shasum -a 256 *.dmg *.deb *.tar.gz > SHA256SUMS 2>/dev/null || true
          ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE=""
          if [[ "$TAG" == v0.* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" \
            --title "KeibiDrop $TAG" \
            --generate-notes \
            $PRERELEASE \
            release/*
