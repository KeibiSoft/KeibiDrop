name: Release

# Tag convention (beta only for now):
#   v0.2.0-beta.1  → Beta prerelease
#   v0.2.0         → When ready for stable
#
# Usage: git tag v0.2.0-beta.1 && git push origin v0.2.0-beta.1

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
            name: macOS-arm64
            goos: darwin
            goarch: arm64
            package: dmg
          - os: macos-15
            name: macOS-x86_64
            goos: darwin
            goarch: amd64
            package: tar
            cross: true
          - os: ubuntu-22.04
            name: Linux-x86_64
            goos: linux
            goarch: amd64
            package: deb
          - os: ubuntu-22.04
            name: Linux-arm64
            goos: linux
            goarch: arm64
            package: tar
            cross: true
          - os: windows-2022
            name: Windows-x86_64
            goos: windows
            goarch: amd64
            package: zip
          - os: windows-2022
            name: Windows-arm64
            goos: windows
            goarch: arm64
            package: zip
            cross: true

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          COMMIT=$(git rev-parse --short HEAD)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
          key: rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock') }}

      - name: Install FUSE dev headers and protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse-dev libfuse3-dev protobuf-compiler

      - name: Install macFUSE and protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o /tmp/macfuse.dmg "https://github.com/macfuse/macfuse/releases/download/macfuse-5.1.3/macfuse-5.1.3.dmg"
          hdiutil attach /tmp/macfuse.dmg -nobrowse -quiet
          sudo installer -pkg "/Volumes/macFUSE/Install macFUSE.pkg" -target /
          hdiutil detach "/Volumes/macFUSE" -quiet
          brew install protobuf

      - name: Install WinFsp and protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install winfsp protoc -y
          $winfspDir = "C:\Program Files (x86)\WinFsp"
          echo "CPATH=$winfspDir\inc\fuse" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L$winfspDir\lib" >> $env:GITHUB_ENV

      - name: Install protoc Go plugins
        shell: bash
        run: make install-proto

      - name: Install nfpm (Linux)
        if: runner.os == 'Linux'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Add Rust cross-compile target (macOS x86_64 from arm64)
        if: matrix.cross == true
        run: rustup target add x86_64-apple-darwin

      - name: Build Rust UI
        if: runner.os != 'Windows' && matrix.cross != true
        run: make build-rust

      - name: Build Rust UI (cross-compile x86_64)
        if: matrix.cross == true && runner.os == 'macOS'
        run: |
          CGO_ENABLED=1 GOARCH=amd64 go build -buildmode=c-archive -o libkeibidrop.a ./rustbridge
          cd rust && cargo build --release --target x86_64-apple-darwin
          mkdir -p target/release
          cp target/x86_64-apple-darwin/release/keibidrop-rust target/release/keibidrop-rust

      - name: Build CLI and kd
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          COMMIT=${{ steps.version.outputs.commit }}
          GOARCH=${{ matrix.goarch }} make build-cli build-kd VERSION=$VERSION COMMIT=$COMMIT

      - name: Package .dmg (macOS arm64)
        if: matrix.package == 'dmg'
        run: make package-macos

      - name: Package .tar.gz
        if: matrix.package != 'zip'
        shell: bash
        run: make package-tar

      - name: Package .zip (Windows)
        if: matrix.package == 'zip'
        shell: bash
        run: |
          mkdir -p dist
          VERSION=${{ steps.version.outputs.version }}
          zip -j "dist/keibidrop-${VERSION}-windows-amd64.zip" keibidrop-cli.exe kd.exe README.md LICENSE

      - name: Package .deb (Linux)
        if: matrix.package == 'deb'
        run: make package-deb

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release files and generate checksums
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS 2>/dev/null || shasum -a 256 * > SHA256SUMS
          ls -lh release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Beta for now, stable later
          PRERELEASE="--prerelease"
          TITLE="KeibiDrop $TAG (Beta)"

          if [[ "$TAG" != *"-"* ]] && [[ "$TAG" != v0.* ]]; then
            # Stable: v1.0.0+ with no suffix
            PRERELEASE=""
            TITLE="KeibiDrop $TAG"
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            --generate-notes \
            $PRERELEASE \
            release/*
