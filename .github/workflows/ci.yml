name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install FUSE dev headers
        run: sudo apt-get install -y libfuse3-dev

      - name: Run tests
        run: go test -v -count=1 -timeout 180s ./tests/...

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install FUSE dev headers
        run: sudo apt-get install -y libfuse3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            name: macOS arm64
          - os: macos-13
            name: macOS x86_64
          - os: ubuntu-22.04
            name: Linux x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
          key: rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock') }}

      - name: Install protoc and FUSE dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse3-dev protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc Go plugins
        run: make install-proto

      - name: Build Rust UI (includes protoc + Go static lib)
        run: make build-rust

      - name: Build CLI
        run: make build-cli

      - name: Build kd
        run: make build-kd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keibidrop-${{ runner.os }}-${{ runner.arch }}
          path: |
            rust/target/release/keibidrop-rust
            keibidrop-cli
            kd
