name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install FUSE dev headers
        run: sudo apt-get install -y libfuse-dev libfuse3-dev

      - name: Enable user_allow_other for FUSE mounts
        run: |
          sudo sh -c 'echo user_allow_other >> /etc/fuse.conf'

      - name: Run tests
        run: go test -v -count=1 -timeout 180s -skip 'BlockSizeSweep|WorkerCountSweep|PullFileProfile|BaselineComparison|FUSEReadOverhead|FUSEWriteThroughput|TransferThroughputNetem|MeasureLatency|OpenCloseLatency|ChunkLatency|PullFileThroughput|EncryptedGRPC|TransferThroughput|SecureConnThroughput' ./tests/...

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install FUSE dev headers
        run: sudo apt-get install -y libfuse-dev libfuse3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=3m

  build:
    strategy:
      matrix:
        include:
          - os: macos-15
            name: macOS arm64
            goarch: arm64
          - os: macos-15
            name: macOS x86_64
            goarch: amd64
            cross: true
          - os: ubuntu-22.04
            name: Linux x86_64
            goarch: amd64
          - os: windows-2022
            name: Windows x86_64
            goarch: amd64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
          key: rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock') }}

      - name: Install FUSE dev headers and protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse-dev libfuse3-dev protobuf-compiler

      - name: Install macFUSE and protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o /tmp/macfuse.dmg "https://github.com/macfuse/macfuse/releases/download/macfuse-5.1.3/macfuse-5.1.3.dmg"
          hdiutil attach /tmp/macfuse.dmg -nobrowse -quiet
          sudo installer -pkg "/Volumes/macFUSE/Install macFUSE.pkg" -target /
          hdiutil detach "/Volumes/macFUSE" -quiet
          brew install protobuf

      - name: Install WinFsp and protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install winfsp protoc -y
          $winfspDir = "C:\Program Files (x86)\WinFsp"
          echo "CPATH=$winfspDir\inc\fuse" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L$winfspDir\lib" >> $env:GITHUB_ENV

      - name: Install protoc Go plugins
        shell: bash
        run: make install-proto

      - name: Add Rust cross-compile target (macOS x86_64 from arm64)
        if: matrix.cross == true
        run: rustup target add x86_64-apple-darwin

      - name: Build Rust UI
        if: runner.os != 'Windows' && matrix.cross != true
        run: make build-rust

      - name: Build Rust UI (cross-compile x86_64)
        if: matrix.cross == true && runner.os == 'macOS'
        run: |
          CGO_ENABLED=1 GOARCH=amd64 go build -buildmode=c-archive -o libkeibidrop.a ./rustbridge
          cd rust && cargo build --release --target x86_64-apple-darwin
          mkdir -p target/release
          cp target/x86_64-apple-darwin/release/keibidrop-rust target/release/keibidrop-rust

      - name: Set cross-compile env (macOS x86_64 from arm64)
        if: matrix.cross == true && runner.os == 'macOS'
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          echo "CGO_CFLAGS=-arch x86_64" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-arch x86_64" >> $GITHUB_ENV

      - name: Build CLI
        shell: bash
        run: GOARCH=${{ matrix.goarch }} make build-cli

      - name: Build kd
        shell: bash
        run: GOARCH=${{ matrix.goarch }} make build-kd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keibidrop-${{ matrix.name }}
          path: |
            rust/target/release/keibidrop-rust*
            keibidrop-cli*
            kd*
            !kd.exe.manifest
